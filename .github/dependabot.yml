version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      # Grupo que você já validou e funciona
      safe-dev-updates:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      
      # NOVO: Produção e Majors ficam FORA do grupo automático
      # Ao não estarem em um grupo, elas abrirão PRs individuais 
      # que sua Action irá ignorar (não fará deploy)
    versioning-strategy: increase # Mantém consistência no monorepo [7]