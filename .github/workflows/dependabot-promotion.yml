name: Dependabot Promotion Flow

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch: 
    inputs:
      pr_number:
        description: 'Número do PR do Dependabot para validar manualmente'
        required: false

jobs:
  validate-and-dev:
    name: Build & Deploy to Develop
    # Agora o job roda se for o bot OU se você disparar manualmente
    if: github.actor == 'dependabot[bot]' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        run: |
          yarn install
          # yarn test (Descomente quando tiver testes)

      - name: Dependabot Metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2

      - name: Auto-merge to Develop
        # O merge manual via CLI do GitHub (gh pr merge)
        run: gh pr merge --auto --merge "${{ github.event.pull_request.html_url || inputs.pr_number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-homolog:
    name: Deploy to Homologation
    needs: validate-and-dev
    runs-on: ubuntu-latest
    # ESSENCIAL: Configure "Required Reviewers" nas Settings do Repo para este Environment
    environment: homolog 
    steps:
      - name: Deploying to Homolog
        run: echo "Aguardando aprovação humana para Homolog..."

  deploy-production:
    name: Deploy to Production
    needs: deploy-homolog
    runs-on: ubuntu-latest
    # ESSENCIAL: Configure "Required Reviewers" nas Settings do Repo para este Environment
    environment: production
    steps:
      - name: Deploying to Production
        run: echo "Aguardando aprovação humana para Produção..."
