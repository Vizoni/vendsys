name: Dependabot Promotion Flow

on:
  pull_request:
    branches: [ main ]

jobs:
  validate-and-dev:
    name: Build & Deploy to Develop
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        run: |
          yarn install
          # yarn test (Descomente quando tiver testes)

      - name: Dependabot Metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2

      # AGORA COM FILTRO RÍGIDO: 
      # Só faz automerge se for devDependencies E (minor OU patch).
      # Se for 'dependencies' (produção) ou 'major', este step será pulado.
      - name: Auto-merge to Develop
        if: >
          steps.metadata.outputs.dependency-type == 'development' &&
          (steps.metadata.outputs.update-type == 'version-update:semver-patch' || 
           steps.metadata.outputs.update-type == 'version-update:semver-minor')
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

  deploy-homolog:
    name: Deploy to Homologation
    needs: validate-and-dev
    runs-on: ubuntu-latest
    # ESSENCIAL: Configure "Required Reviewers" nas Settings do Repo para este Environment
    environment: homolog 
    steps:
      - name: Deploying to Homolog
        run: echo "Aguardando aprovação humana para Homolog..."

  deploy-production:
    name: Deploy to Production
    needs: deploy-homolog
    runs-on: ubuntu-latest
    # ESSENCIAL: Configure "Required Reviewers" nas Settings do Repo para este Environment
    environment: production
    steps:
      - name: Deploying to Production
        run: echo "Aguardando aprovação humana para Produção..."
