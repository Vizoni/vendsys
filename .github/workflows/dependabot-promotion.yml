name: Dependabot Promotion Flow

on:
  pull_request:
    branches: [ main ] # O PR original do Dependabot costuma mirar na main

jobs:
  # --- ETAPA 1: VALIDAÇÃO E DEPLOY EM DEVELOP ---
  validate-and-dev:
    name: Build & Deploy to Develop
    # Garante que este workflow só rode para o Dependabot
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build (Simulação)
        run: |
          npm ci
          # Aqui rodariam seus testes e build:
          # npm run lint
          # npm test
          # npm run build
      
      # Coleta metadados do Dependabot (se é minor, patch, devDep, etc)
      - name: Dependabot Metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2

      # Se o build passou, fazemos o "deploy" automático para a branch de develop
      # Nota: Usamos o comando 'gh pr merge' para automerge se for minor ou devDep
      - name: Auto-merge to Develop
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
          steps.metadata.outputs.dependency-group == 'dev-dependencies'
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

  # --- ETAPA 2: DEPLOY EM HOMOLOG (REQUER APROVAÇÃO) ---
  deploy-homolog:
    name: Deploy to Homologation
    needs: validate-and-dev
    runs-on: ubuntu-latest
    # O 'environment' homolog deve estar configurado no GitHub com "Required Reviewers"
    environment: homolog 
    steps:
      - name: Deploying to Homolog
        run: echo "Executando scripts de deploy para o ambiente de HOMOLOG..."

  # --- ETAPA 3: DEPLOY EM PRODUÇÃO (REQUER APROVAÇÃO) ---
  deploy-production:
    name: Deploy to Production (Main)
    needs: deploy-homolog
    runs-on: ubuntu-latest
    # O 'environment' production deve estar configurado no GitHub com aprovação do time
    environment: production
    steps:
      - name: Deploying to Production
        run: echo "Executando scripts de deploy final para PRODUÇÃO..."
