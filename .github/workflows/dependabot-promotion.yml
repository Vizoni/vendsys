name: Dependabot Promotion Flow

on:
  pull_request:
    branches: [ main ]

jobs:
  # ETAPA 0: ANALISAR O PR (Para decidir se prossegue com deploy ou não)
  check-metadata:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    outputs:
      should_deploy: ${{ steps.decision.outputs.should_deploy }}
    steps:
      - id: metadata
        uses: dependabot/fetch-metadata@v2
      
      - id: decision
        # LÓGICA: Só permite deploy se for (development AND não for major)
        run: |
          if [[ "${{ steps.metadata.outputs.dependency-type }}" == "development" ]] && [[ "${{ steps.metadata.outputs.update-type }}" != "version-update:semver-major" ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

  # ETAPA 1: SÓ RODA SE FOR "SAFE"
  validate-and-dev:
    needs: check-metadata
    if: needs.check-metadata.outputs.should_deploy == 'true'
    name: Build & Deploy to Develop
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: yarn install && yarn build # Validação técnica

      - name: Auto-merge to Develop
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

  # ETAPA 2 e 3 (Mantêm o environment com aprovação humana)
  deploy-homolog:
    needs: validate-and-dev
    environment: homolog 
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploying safe update to Homolog..."

  deploy-production:
    needs: deploy-homolog
    environment: production
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploying safe update to Production..."